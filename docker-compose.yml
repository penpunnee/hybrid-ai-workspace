version: "3.8"

services:
  streamlit:
    build: .
    container_name: hybrid-ai-workspace
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./chat_history.db:/app/chat_history.db
      - ./identity.json:/app/identity.json
    env_file:
      - .env

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run ai-workspace
    volumes:
      - /var/services/homes/pawin/.cloudflared:/etc/cloudflared

volumes:
  chroma_data:
