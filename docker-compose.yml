version: "3.8"

services:
  hybrid-ai:
    build: .
    container_name: ai-backend
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ${NAS_DATA_PATH:-./data}/chat_history.db:/app/chat_history.db
      - ./identity.json:/app/identity.json
      - ${OBSIDIAN_VAULT_NAS_PATH:-./data}:/vault:ro
      - ${NAS_DATA_PATH:-./data}/dream_reports:/app/dream_reports
      - ${NAS_DATA_PATH:-./data}/skills_db.json:/app/skills_db.json
    environment:
      - DB_PATH=/app/chat_history.db
      - OBSIDIAN_VAULT_PATH=/vault
    env_file:
      - .env

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ai-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run ai-workspace
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - /var/services/homes/pawin/.cloudflared:/etc/cloudflared

volumes:
  chroma_data:
