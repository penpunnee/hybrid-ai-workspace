<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid AI Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;
  --sidebar-bg:rgba(11,14,22,0.96);
  --sidebar-border:rgba(255,255,255,0.055);
  --glass-bg:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.08);
  --text:#d8e4f8;
  --text-dim:rgba(148,163,184,0.7);
  --text-muted:rgba(100,120,150,0.55);
  --accent-cyan:#00d4ff;
  --accent-pink:#e83ccc;
  --accent-purple:#8b5cf6;
  --active-bg:rgba(255,255,255,0.07);
  --radius:14px;
  --font:'Sora',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* ===== ORBS ===== */
.orb-field{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(88px);mix-blend-mode:screen}
.orb-1{
  width:420px;height:420px;
  background:radial-gradient(circle,rgba(0,212,255,.6) 0%,rgba(0,180,255,.12) 55%,transparent 75%);
  top:-60px;right:18%;
  animation:drift1 20s ease-in-out infinite alternate;
}
.orb-2{
  width:340px;height:340px;
  background:radial-gradient(circle,rgba(232,60,204,.52) 0%,rgba(180,30,160,.1) 55%,transparent 75%);
  bottom:40px;right:26%;
  animation:drift2 24s ease-in-out infinite alternate;
}
.orb-3{
  width:240px;height:240px;
  background:radial-gradient(circle,rgba(139,92,246,.48) 0%,rgba(100,60,220,.1) 55%,transparent 75%);
  bottom:70px;right:7%;
  animation:drift3 18s ease-in-out infinite alternate;
}
@keyframes drift1{0%{transform:translate(0,0)}100%{transform:translate(-40px,30px)}}
@keyframes drift2{0%{transform:translate(0,0)}100%{transform:translate(30px,-25px)}}
@keyframes drift3{0%{transform:translate(0,0)}100%{transform:translate(-20px,20px)}}

/* ===== LAYOUT ===== */
.layout{display:flex;height:100vh;position:relative;z-index:1}

/* ===== SIDEBAR ===== */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--sidebar-bg);
  border-right:1px solid var(--sidebar-border);
  backdrop-filter:blur(28px);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-top{padding:16px 14px 0}
.ai-card{display:flex;align-items:center;gap:10px;padding-bottom:16px}
.ai-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:700;color:#fff;flex-shrink:0;
  cursor:default;user-select:none;
}
.av-fa  {background:linear-gradient(135deg,#0ea5e9,#38bdf8);box-shadow:0 0 14px rgba(14,165,233,.35)}
.av-kwan{background:linear-gradient(135deg,#f97316,#fb923c);box-shadow:0 0 14px rgba(249,115,22,.35)}
.av-khim{background:linear-gradient(135deg,#8b5cf6,#a78bfa);box-shadow:0 0 14px rgba(139,92,246,.35)}
.ai-card-meta{flex:1;min-width:0}
.ai-card-name{font-size:.88rem;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pro-badge{
  display:inline-block;font-size:.55rem;font-weight:700;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:#fff;border-radius:4px;padding:1px 5px;
  vertical-align:middle;margin-left:4px;letter-spacing:.04em;
}

/* AI switcher */
.ai-switcher{display:flex;gap:5px;margin-bottom:12px}
.ai-switch-btn{
  flex:1;padding:5px 2px;border-radius:8px;border:1px solid var(--glass-border);
  background:transparent;color:var(--text-dim);font-family:var(--font);font-size:.72rem;
  cursor:pointer;transition:all .18s;white-space:nowrap;text-align:center;
}
.ai-switch-btn:hover{background:var(--glass-bg);color:var(--text)}
.ai-switch-btn.active{background:var(--active-bg);color:var(--text);border-color:rgba(255,255,255,.14);font-weight:600}

/* New chat button */
.new-chat-btn{
  width:100%;padding:9px 14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:11px;
  color:rgba(210,228,255,.88);font-family:var(--font);font-size:.82rem;font-weight:500;
  cursor:pointer;transition:all .18s;text-align:left;
  display:flex;align-items:center;gap:8px;
  margin-bottom:16px;
}
.new-chat-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.16)}
.new-chat-btn .plus{font-size:1.1rem;opacity:.7}

/* Session list */
.session-list{flex:1;overflow-y:auto;padding:0 8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.session-list::-webkit-scrollbar{width:3px}
.session-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.sess-group{margin-bottom:6px}
.sess-group-label{font-size:.62rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;padding:8px 6px 4px}
.sess-item{
  display:block;width:100%;text-align:left;padding:8px 8px;
  border-radius:9px;border:none;background:transparent;cursor:pointer;
  transition:background .15s;margin-bottom:2px;
}
.sess-item:hover{background:rgba(255,255,255,.05)}
.sess-item.active{background:rgba(255,255,255,.08)}
.sess-title{font-size:.79rem;font-weight:500;color:rgba(220,235,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-time{font-size:.66rem;color:var(--text-muted);margin-top:1px}
.sess-empty{font-size:.74rem;color:var(--text-muted);padding:8px 6px;text-align:center}

/* User profile bottom */
.sidebar-bottom{
  padding:10px 12px;
  border-top:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.user-av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  display:flex;align-items:center;justify-content:center;
  font-size:.74rem;font-weight:700;color:#fff;
}
.user-name{font-size:.78rem;font-weight:600;color:rgba(220,235,255,.85)}
.user-plan{font-size:.63rem;color:var(--text-muted)}
.online-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 7px #22c55e;margin-left:auto;flex-shrink:0}

/* ===== MAIN AREA ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* Header */
.chat-header{
  padding:12px 20px 10px;
  border-bottom:1px solid rgba(255,255,255,.055);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:rgba(7,9,15,.5);backdrop-filter:blur(20px);
}
.chat-header .ai-avatar{width:32px;height:32px;font-size:.82rem}
.header-meta{flex:1}
.header-name{font-size:.92rem;font-weight:700;color:#e2e8f0}
.header-status{font-size:.69rem;color:var(--text-dim);display:flex;align-items:center;gap:5px}
.header-status::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px #22c55e}
.header-actions{display:flex;gap:6px}
.icon-btn{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--glass-border);
  background:transparent;color:var(--text-dim);cursor:pointer;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;transition:all .16s;
}
.icon-btn:hover{background:var(--glass-bg);color:var(--text)}
.provider-badge{
  font-size:.68rem;padding:3px 9px;border-radius:20px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
  color:var(--text-dim);white-space:nowrap;cursor:pointer;transition:all .16s;
}
.provider-badge:hover{background:rgba(255,255,255,.09)}
.provider-badge.gemini{color:#a78bfa;border-color:rgba(139,92,246,.25)}

/* Shortcut bar */
.shortcut-bar{
  display:flex;gap:6px;padding:8px 20px 4px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;
}
.shortcut-bar::-webkit-scrollbar{display:none}
.shortcut-btn{
  padding:5px 11px;border-radius:20px;white-space:nowrap;flex-shrink:0;
  border:1px solid var(--glass-border);background:transparent;
  color:var(--text-dim);font-family:var(--font);font-size:.72rem;cursor:pointer;transition:all .16s;
}
.shortcut-btn:hover{background:var(--glass-bg);color:var(--text)}

/* Chat messages */
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px 8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

.msg{display:flex;gap:10px;margin-bottom:12px;animation:msg-in .22s ease}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;margin-top:2px}
.msg-av.user-av-msg{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.msg-body{
  max-width:72%;padding:10px 14px;border-radius:16px;
  font-size:.85rem;line-height:1.6;
  border:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(16px);
}
.msg.assistant .msg-body{background:rgba(255,255,255,.04);color:rgba(220,235,255,.88);border-radius:4px 16px 16px 16px}
.msg.user .msg-body{background:rgba(255,255,255,.08);color:rgba(230,240,255,.92);border-radius:16px 4px 16px 16px}
.msg-body p{margin-bottom:.5em}
.msg-body p:last-child{margin-bottom:0}
.msg-body pre{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px 12px;overflow-x:auto;margin:.6em 0}
.msg-body code{font-family:var(--font-mono);font-size:.8em}
.msg-body pre code{font-size:.82em}
.msg-body :not(pre) > code{background:rgba(255,255,255,.08);border-radius:4px;padding:1px 5px}
.streaming-cursor::after{content:'▋';animation:blink .7s steps(1) infinite;color:var(--accent-cyan);margin-left:2px}
@keyframes blink{50%{opacity:0}}

/* Memory confirm */
.mem-confirm{
  display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;
  padding:10px 14px;border-radius:12px;
  background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.18);
  font-size:.82rem;color:rgba(134,239,172,.85);
}

/* Chat input area */
.chat-input-wrap{
  padding:10px 20px 16px;flex-shrink:0;
  background:rgba(7,9,15,.55);backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,.05);
}
.input-hint{font-size:.68rem;color:var(--text-muted);margin-bottom:6px}
.input-row{display:flex;gap:8px;align-items:flex-end}
.chat-textarea{
  flex:1;padding:11px 16px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.11);
  border-radius:20px;resize:none;
  color:rgba(220,235,255,.9);font-family:var(--font);font-size:.88rem;line-height:1.5;
  outline:none;transition:border-color .2s,box-shadow .2s;max-height:120px;overflow-y:auto;
}
.chat-textarea::placeholder{color:rgba(148,163,184,.4)}
.chat-textarea:focus{border-color:rgba(148,163,210,.28);box-shadow:0 0 0 3px rgba(100,120,255,.06)}
.send-btn{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,rgba(0,180,255,.22),rgba(120,60,240,.22));
  border:1px solid rgba(120,160,255,.22);
  color:rgba(180,210,255,.9);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
}
.send-btn:hover:not(:disabled){background:linear-gradient(135deg,rgba(0,180,255,.32),rgba(120,60,240,.3));border-color:rgba(120,160,255,.35)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* Code editor panel */
.code-panel{
  position:fixed;bottom:90px;right:20px;width:420px;
  background:rgba(10,13,22,.95);border:1px solid rgba(255,255,255,.1);
  border-radius:16px;backdrop-filter:blur(24px);z-index:50;
  display:none;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.code-panel.open{display:flex}
.code-panel-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.code-panel-title{font-size:.82rem;font-weight:600;color:rgba(200,220,255,.85);flex:1}
.code-lang-select{
  padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
  color:var(--text-dim);font-family:var(--font);font-size:.72rem;outline:none;cursor:pointer;
}
.close-panel-btn{width:24px;height:24px;border-radius:6px;border:none;background:rgba(255,255,255,.06);color:var(--text-dim);cursor:pointer;font-size:.9rem;transition:all .15s}
.close-panel-btn:hover{background:rgba(255,255,255,.12);color:var(--text)}
.code-textarea{
  flex:1;padding:12px 14px;background:transparent;border:none;resize:none;
  color:rgba(200,230,200,.88);font-family:var(--font-mono);font-size:.8rem;line-height:1.55;outline:none;
  min-height:200px;
}
.code-actions{display:flex;gap:6px;padding:8px 12px;border-top:1px solid rgba(255,255,255,.07)}
.code-action-btn{
  padding:5px 12px;border-radius:7px;border:1px solid var(--glass-border);
  background:transparent;color:var(--text-dim);font-family:var(--font);font-size:.72rem;cursor:pointer;transition:all .15s;
}
.code-action-btn:hover{background:var(--glass-bg);color:var(--text)}

/* Code toggle */
.code-toggle-btn{
  position:fixed;bottom:100px;right:20px;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:rgba(200,220,255,.7);font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;z-index:40;
}
.code-toggle-btn:hover{background:rgba(255,255,255,.12)}

/* Toast */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(15,20,32,.95);border:1px solid rgba(255,255,255,.1);border-radius:12px;
  padding:10px 18px;font-size:.8rem;color:rgba(210,230,255,.85);
  pointer-events:none;opacity:0;transition:all .3s;z-index:200;backdrop-filter:blur(20px);
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- Background Orbs -->
<div class="orb-field">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <!-- AI Card -->
      <div class="ai-card">
        <div class="ai-avatar av-khim" id="sidebar-av">K</div>
        <div class="ai-card-meta">
          <div class="ai-card-name" id="sidebar-ai-name">ขิม AI <span class="pro-badge">Pro</span></div>
        </div>
      </div>

      <!-- AI Switcher -->
      <div class="ai-switcher" id="ai-switcher"></div>

      <!-- New Chat -->
      <button class="new-chat-btn" id="new-chat-btn">
        <span class="plus">＋</span> เริ่มแชทใหม่
      </button>
    </div>

    <!-- Session List -->
    <div class="session-list" id="session-list"></div>

    <!-- User Profile -->
    <div class="sidebar-bottom">
      <div class="user-av">P</div>
      <div>
        <div class="user-name">พี่ปอย</div>
        <div class="user-plan">Pro Plan</div>
      </div>
      <div class="online-dot"></div>
    </div>
  </aside>

  <!-- ===== MAIN AREA ===== -->
  <main class="main">

    <!-- Header -->
    <div class="chat-header">
      <div class="ai-avatar av-khim" id="header-av">K</div>
      <div class="header-meta">
        <div class="header-name" id="header-ai-name">ขิม AI</div>
        <div class="header-status" id="header-status">ออนไลน์ · Local · llama3</div>
      </div>
      <div class="header-actions">
        <button class="provider-badge" id="provider-btn" onclick="toggleProvider()">🏠 Local</button>
        <button class="icon-btn" title="Export" onclick="exportChat()">💾</button>
        <button class="icon-btn" title="ล้างแชท" onclick="clearChat()">🗑️</button>
      </div>
    </div>

    <!-- Shortcuts -->
    <div class="shortcut-bar" id="shortcut-bar"></div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages"></div>

    <!-- Input -->
    <div class="chat-input-wrap">
      <div class="input-hint">💡 พิมพ์ <strong>จำไว้ว่า ...</strong> เพื่อบันทึกลง Memory</div>
      <div class="input-row">
        <textarea class="chat-textarea" id="chat-input" rows="1"
          placeholder="ส่งความคิดให้ฉันได้เลย..."></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </main>
</div>

<!-- Code Editor Panel -->
<button class="code-toggle-btn" title="Code Editor" onclick="toggleCode()">💻</button>
<div class="code-panel" id="code-panel">
  <div class="code-panel-header">
    <span class="code-panel-title">💻 Code Editor</span>
    <select class="code-lang-select" id="code-lang">
      <option>python</option><option>javascript</option><option>typescript</option>
      <option>html</option><option>css</option><option>sql</option><option>json</option><option>markdown</option>
    </select>
    <button class="close-panel-btn" onclick="toggleCode()">✕</button>
  </div>
  <textarea class="code-textarea" id="code-textarea" placeholder="วางโค้ดที่นี่..."></textarea>
  <div class="code-actions">
    <button class="code-action-btn" onclick="codeAction('review')">🔍 Review</button>
    <button class="code-action-btn" onclick="codeAction('bug')">🐛 Bug</button>
    <button class="code-action-btn" onclick="codeAction('explain')">✨ อธิบาย</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const state = {
  assistants: [],
  currentAssistant: null,
  currentSessionId: null,
  provider: localStorage.getItem('provider') || 'ollama',
  streaming: false,
  config: {},
};

const AI_META = {
  fa:   { letter:'F', cls:'av-fa',   short:'🩵 ฟ้า' },
  kwan: { letter:'K', cls:'av-kwan', short:'🧡 ขวัญ' },
  khim: { letter:'K', cls:'av-khim', short:'💙 ขิม' },
};

// ===== INIT =====
async function init() {
  const cfg = await fetch('/api/config').then(r => r.json());
  state.config = cfg;
  state.assistants = cfg.assistants;

  // Build AI switcher
  const switcher = document.getElementById('ai-switcher');
  cfg.assistants.forEach((ai, i) => {
    const meta = AI_META[ai.slug] || { letter: ai.name[0], cls: 'av-fa', short: ai.name };
    const btn = document.createElement('button');
    btn.className = 'ai-switch-btn';
    btn.textContent = meta.short;
    btn.dataset.idx = i;
    btn.onclick = () => selectAssistant(i);
    switcher.appendChild(btn);
  });

  // Select first assistant
  const lastAssistant = localStorage.getItem('currentAssistant') || '0';
  await selectAssistant(parseInt(lastAssistant));

  // Auto-resize textarea
  const ta = document.getElementById('chat-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  updateProviderUI();
  updateStatus();
}

async function selectAssistant(idx) {
  state.currentAssistant = state.assistants[idx];
  localStorage.setItem('currentAssistant', idx);

  const meta = AI_META[state.currentAssistant.slug] || { letter: state.currentAssistant.name[0], cls: 'av-fa' };

  // Update sidebar card
  const sav = document.getElementById('sidebar-av');
  sav.textContent = meta.letter;
  sav.className = `ai-avatar ${meta.cls}`;
  document.getElementById('sidebar-ai-name').innerHTML =
    `${state.currentAssistant.name} <span class="pro-badge">Pro</span>`;

  // Update header
  const hav = document.getElementById('header-av');
  hav.textContent = meta.letter;
  hav.className = `ai-avatar ${meta.cls}`;
  document.getElementById('header-ai-name').textContent = state.currentAssistant.name;

  // Switcher active state
  document.querySelectorAll('.ai-switch-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });

  // Shortcuts
  const bar = document.getElementById('shortcut-bar');
  bar.innerHTML = '';
  (state.currentAssistant.templates || []).forEach(([label, tpl]) => {
    const b = document.createElement('button');
    b.className = 'shortcut-btn';
    b.textContent = label;
    b.onclick = () => { document.getElementById('chat-input').value = tpl; document.getElementById('chat-input').focus(); };
    bar.appendChild(b);
  });

  // Load sessions
  await loadSessions();
}

// ===== SESSIONS =====
async function loadSessions() {
  const name = state.currentAssistant.name;
  const sessions = await fetch(`/api/sessions/${encodeURIComponent(name)}`).then(r => r.json());

  // Group by date
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  const groups = { 'วันนี้': [], 'เมื่อวาน': [], 'ก่อนหน้า': [] };

  sessions.forEach(s => {
    const d = new Date(s.started_at); d.setHours(0,0,0,0);
    if (d >= today) groups['วันนี้'].push(s);
    else if (d >= yesterday) groups['เมื่อวาน'].push(s);
    else groups['ก่อนหน้า'].push(s);
  });

  const list = document.getElementById('session-list');
  list.innerHTML = '';

  if (sessions.length === 0) {
    list.innerHTML = '<div class="sess-empty">ยังไม่มีประวัติ</div>';
  } else {
    Object.entries(groups).forEach(([label, items]) => {
      if (!items.length) return;
      const g = document.createElement('div');
      g.className = 'sess-group';
      g.innerHTML = `<div class="sess-group-label">${label}</div>`;
      items.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'sess-item' + (s.session_id === state.currentSessionId ? ' active' : '');
        btn.dataset.sid = s.session_id;
        const time = s.started_at ? s.started_at.substring(11,16) : 'เมื่อนี้';
        btn.innerHTML = `<div class="sess-title">${escHtml(s.first_msg)}</div><div class="sess-time">${time}</div>`;
        btn.onclick = () => loadSession(s.session_id);
        g.appendChild(btn);
      });
      list.appendChild(g);
    });
  }

  // Auto-select first session or create new
  if (!state.currentSessionId) {
    if (sessions.length > 0) {
      await loadSession(sessions[0].session_id);
    } else {
      await createNewSession();
    }
  }
}

async function loadSession(sessionId) {
  state.currentSessionId = sessionId;
  document.querySelectorAll('.sess-item').forEach(b => {
    b.classList.toggle('active', b.dataset.sid === sessionId);
  });
  const history = await fetch(`/api/history/${encodeURIComponent(state.currentAssistant.name)}/${sessionId}`).then(r => r.json());
  renderHistory(history);
}

async function createNewSession() {
  const res = await fetch(`/api/sessions/${encodeURIComponent(state.currentAssistant.name)}`, {method:'POST'}).then(r => r.json());
  state.currentSessionId = res.session_id;
  clearMessages();
  await loadSessions();
}

document.getElementById('new-chat-btn').onclick = createNewSession;

// ===== MESSAGES =====
function renderHistory(history) {
  clearMessages();
  history.forEach(m => appendMessage(m.role, m.content));
  scrollBottom();
}

function clearMessages() {
  document.getElementById('chat-messages').innerHTML = '';
}

function appendMessage(role, content) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const meta = AI_META[state.currentAssistant?.slug] || { letter:'A', cls:'av-fa' };
  const avClass = role === 'user' ? 'user-av-msg' : meta.cls;
  const avLetter = role === 'user' ? 'P' : meta.letter;
  div.innerHTML = `
    <div class="msg-av ${avClass}">${avLetter}</div>
    <div class="msg-body">${renderMd(content)}</div>`;
  container.appendChild(div);
  scrollBottom();
  return div;
}

function appendMemConfirm(text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'mem-confirm';
  div.innerHTML = `✅ <div><strong>จำแล้วนะค่ะ!</strong><br><em>${escHtml(text)}</em></div>`;
  container.appendChild(div);
  scrollBottom();
}

// ===== SEND =====
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const prompt = input.value.trim();
  if (!prompt || state.streaming) return;

  // "จำไว้ว่า" command
  if (/^(จำไว้ว่า|จำไว้|จำว่า)\s/.test(prompt)) {
    const text = prompt.replace(/^(จำไว้ว่า|จำไว้|จำว่า)\s+/, '').trim();
    appendMessage('user', prompt);
    input.value = ''; input.style.height = 'auto';
    await fetch(`/api/memory/${encodeURIComponent(state.currentAssistant.name)}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text}),
    });
    appendMemConfirm(text);
    await loadSessions();
    return;
  }

  appendMessage('user', prompt);
  input.value = ''; input.style.height = 'auto';
  state.streaming = true;
  document.getElementById('send-btn').disabled = true;

  // Create streaming message bubble
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  const meta = AI_META[state.currentAssistant?.slug] || { letter:'A', cls:'av-fa' };
  const body = document.createElement('div');
  body.className = 'msg-body streaming-cursor';
  div.innerHTML = `<div class="msg-av ${meta.cls}">${meta.letter}</div>`;
  div.appendChild(body);
  container.appendChild(div);
  scrollBottom();

  let buffer = '';
  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        assistant: state.currentAssistant.name,
        session_id: state.currentSessionId,
        prompt, provider: state.provider,
      }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let leftover = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      leftover += decoder.decode(value, { stream: true });
      const lines = leftover.split('\n');
      leftover = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const obj = JSON.parse(line.slice(6));
          if (obj.chunk) { buffer += obj.chunk; body.innerHTML = renderMd(buffer); scrollBottom(); }
          if (obj.error) { body.innerHTML = `<span style="color:#f87171">❌ ${escHtml(obj.error)}</span>`; }
          if (obj.done) { body.classList.remove('streaming-cursor'); }
        } catch(_) {}
      }
    }
  } catch(e) {
    body.innerHTML = `<span style="color:#f87171">❌ เชื่อมต่อ server ไม่ได้</span>`;
    body.classList.remove('streaming-cursor');
  }

  state.streaming = false;
  document.getElementById('send-btn').disabled = false;
  await loadSessions();
}

// ===== PROVIDER =====
function toggleProvider() {
  state.provider = state.provider === 'ollama' ? 'gemini' : 'ollama';
  localStorage.setItem('provider', state.provider);
  updateProviderUI();
}

function updateProviderUI() {
  const btn = document.getElementById('provider-btn');
  const model = state.provider === 'ollama' ? state.config.ollama_model || 'llama3' : state.config.gemini_model || 'gemini-2.0-flash';
  if (state.provider === 'ollama') {
    btn.textContent = `🏠 Local · ${model}`;
    btn.className = 'provider-badge';
  } else {
    btn.textContent = `☁️ Gemini · ${model}`;
    btn.className = 'provider-badge gemini';
  }
  const model2 = state.provider === 'ollama' ? state.config.ollama_model || 'llama3' : state.config.gemini_model || 'gemini-2.0-flash';
  document.getElementById('header-status').textContent = `ออนไลน์ · ${state.provider === 'ollama' ? 'Local' : 'Cloud'} · ${model2}`;
}

// ===== CLEAR / EXPORT =====
async function clearChat() {
  if (!confirm('ล้างการสนทนานี้?')) return;
  await fetch(`/api/sessions/${encodeURIComponent(state.currentAssistant.name)}/${state.currentSessionId}`, {method:'DELETE'});
  clearMessages();
  await loadSessions();
  showToast('🗑️ ล้างแล้ว');
}

async function exportChat() {
  const data = await fetch(`/api/export/${encodeURIComponent(state.currentAssistant.name)}/${state.currentSessionId}`).then(r=>r.json());
  const blob = new Blob([data.markdown], {type:'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`chat_${state.currentSessionId}.md`; a.click();
  URL.revokeObjectURL(url);
  showToast('💾 Export สำเร็จ');
}

// ===== CODE EDITOR =====
function toggleCode() {
  document.getElementById('code-panel').classList.toggle('open');
}
function codeAction(type) {
  const code = document.getElementById('code-textarea').value.trim();
  const lang = document.getElementById('code-lang').value;
  if (!code) { showToast('⚠️ ยังไม่มีโค้ด'); return; }
  const map = {
    review: `ช่วย review โค้ดนี้และแนะนำการปรับปรุง:\n\n\`\`\`${lang}\n${code}\n\`\`\``,
    bug:    `ช่วยหา bug ในโค้ดนี้:\n\n\`\`\`${lang}\n${code}\n\`\`\``,
    explain:`อธิบายโค้ดนี้ทีละบรรทัด:\n\n\`\`\`${lang}\n${code}\n\`\`\``,
  };
  document.getElementById('chat-input').value = map[type];
  document.getElementById('code-panel').classList.remove('open');
  sendMessage();
}

// ===== STATUS =====
async function updateStatus() {
  const s = await fetch('/api/status').then(r=>r.json());
  if (!s.ollama && state.provider === 'ollama') showToast('⚠️ Ollama ออฟไลน์');
}

// ===== UTILS =====
function renderMd(text) {
  if (typeof marked === 'undefined') return escHtml(text).replace(/\n/g,'<br>');
  return marked.parse(text, {breaks:true});
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollBottom() {
  const c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
}
function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ===== START =====
init();
</script>
